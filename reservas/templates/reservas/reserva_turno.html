{% extends "reservas/base.html" %}

{% block content %}
{% include "reservas/partials/progreso.html" %}

<div class="card">
    <h2>Servicio</h2>
    <p class="helper-text">Elige si quieres reservar para comida o cena.</p>

    <form method="post">
        {% csrf_token %}

        {% for servicio in servicios %}
            <button class="option-button" name="turno" value="{{ servicio.id }}">
                <strong>{{ servicio.nombre }}</strong><br>
                <span>{{ servicio.descripcion }}</span>
            </button>
        {% empty %}
            <p class="muted">No hay servicios disponibles.</p>
        {% endfor %}
    </form>

    <a class="back-link" href="{% url 'reserva_personas' %}">Volver</a>
</div>
{% endblock %}
