{% extends "reservas/base.html" %}

{% block content %}
<div class="card">
    <h2>Modificar reserva</h2>

    <form method="post" class="form-vertical">
        {% csrf_token %}

        <input name="personas" type="number" min="1" max="{{ max_personas }}" value="{{ reserva.personas }}" required>
        <input id="editar-fecha" name="fecha" type="date" min="{{ hoy|date:'Y-m-d' }}" value="{{ reserva.fecha|date:'Y-m-d' }}" required>
        <input name="hora" type="time" value="{{ reserva.hora|time:'H:i' }}" required>

        <select name="zona" required>
            <option value="barra" {% if reserva.zona == "barra" %}selected{% endif %}>Barra</option>
            <option value="mesa" {% if reserva.zona == "mesa" %}selected{% endif %}>Mesa</option>
        </select>

        <button class="button">Guardar cambios</button>
    </form>
</div>

<script>
    const editarFecha = document.getElementById("editar-fecha");
    if (editarFecha) {
        editarFecha.addEventListener("change", function () {
            const partes = this.value.split("-");
            const fecha = new Date(Number(partes[0]), Number(partes[1]) - 1, Number(partes[2]));
            const dia = fecha.getDay();
            if (dia === 1 || dia === 2) {
                alert("Estamos de vacaciones lunes y martes. Elige otra fecha para continuar.");
                this.value = "";
            }
        });
    }
</script>
{% endblock %}
